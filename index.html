const LS = {

  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },

};

/* Highlight helpers.
   A highlight is scoped to: day + section id + paragraph index + [start,end) char range.
   The paragraphs of any given section are determined at render time by splitting content on \n\n. */
function getHighlights() { return LS.get(K.highlights, {}); }
function setHighlights(h) { LS.set(K.highlights, h); }
function getHighlightsFor(day, sectionId, allMap) {
  const m = allMap || getHighlights();
  return m[`${day}-${sectionId}`] || [];
}
function addHighlight(day, sectionId, para, start, end) {
  const all = getHighlights();
  const key = `${day}-${sectionId}`;
  const list = all[key] || [];
  // Merge with any overlapping existing highlights on the same paragraph
  const same = list.filter(x => x.p === para);
  const other = list.filter(x => x.p !== para);
  same.push({ p: para, s: start, e: end });
  same.sort((a, b) => a.s - b.s);
  const merged = [];
  for (const h of same) {
    const last = merged[merged.length - 1];
    if (last && h.s <= last.e) last.e = Math.max(last.e, h.e);
    else merged.push({ ...h });
  }
  all[key] = other.concat(merged);
  setHighlights(all);
  return all;
}
function removeHighlightAt(day, sectionId, para, offset) {
  const all = getHighlights();
  const key = `${day}-${sectionId}`;
  const list = all[key] || [];
  const filtered = list.filter(x => !(x.p === para && offset >= x.s && offset < x.e));
  if (filtered.length === list.length) return all;
  all[key] = filtered;
  setHighlights(all);
  return all;
}
/* Render a paragraph string with highlights applied.
   `ranges` is an array of {s,e} sorted by s, non-overlapping.
   Highlighted <mark> tags carry data-attrs so we can remove them on tap. */
function renderParagraph(text, ranges, day, sectionId, para, onRemove) {
  if (!ranges || !ranges.length) return text;
  const parts = [];
  let i = 0;
  for (const r of ranges) {
    if (r.s > i) parts.push(text.slice(i, r.s));
    parts.push(h("mark", {
      key: `m${r.s}`,
      className: "dk-mark",
      style: { backgroundColor: "#FEF3C7", color: "inherit", padding: "1px 2px", borderRadius: 3, cursor: "pointer" },
      onClick: (e) => { e.stopPropagation(); onRemove && onRemove(para, r.s); }
    }, text.slice(r.s, r.e)));
    i = r.e;
  }
  if (i < text.length) parts.push(text.slice(i));
  return parts;
}

function getArticle(day) {

  const m = sectionsMap || getSections();
  return SECTION_IDS.reduce((n, id) => n + (m[`${day}-${id}`] ? 1 : 0), 0);
}
function isDayComplete(day, sectionsMap) {
  return countSectionsDone(day, sectionsMap) === SECTION_IDS.length;
}
function maxUnlockedDay(sectionsMap) {
  const m = sectionsMap || getSections();
  let d = 1;
  while (d <= TOTAL_DAYS && isDayComplete(d, m)) d++;
  return d; // == TOTAL_DAYS + 1 when all done

  const m = sectionsMap || getSections();
  let n = 0;
  for (let d = 1; d <= TOTAL_DAYS; d++) if (isDayComplete(d, m)) n++;
  return n;
}

      onClick: () => _openLightbox && _openLightbox({ src, alt, credit }),
    }),

function Lightbox({ image, onClose }) {
  const [scale, setScale] = useState(1);
  const [tx, setTx] = useState(0);
  const [ty, setTy] = useState(0);
  const gesture = useRef(null); // {mode:'pinch'|'pan', ...}
  const lastTap = useRef(0);

  useEffect(() => {
    if (!image) return;
    // Reset when opened
    setScale(1); setTx(0); setTy(0);
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.removeEventListener("keydown", onKey); document.body.style.overflow = prev; };
  }, [image]);
  if (!image) return null;

  const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

  const onTouchStart = (e) => {
    if (e.touches.length === 2) {
      const [a, b] = [e.touches[0], e.touches[1]];
      const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
      gesture.current = {
        mode: "pinch",
        startDist: Math.hypot(dx, dy),
        startScale: scale,
        startTx: tx, startTy: ty,
      };
    } else if (e.touches.length === 1 && scale > 1) {
      gesture.current = {
        mode: "pan",
        startX: e.touches[0].clientX,
        startY: e.touches[0].clientY,
        startTx: tx, startTy: ty,
      };
    }
  };
  const onTouchMove = (e) => {
    const g = gesture.current;
    if (!g) return;
    if (g.mode === "pinch" && e.touches.length === 2) {
      e.preventDefault();
      const [a, b] = [e.touches[0], e.touches[1]];
      const dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
      const dist = Math.hypot(dx, dy);
      const newScale = clamp(g.startScale * (dist / g.startDist), 1, 6);
      setScale(newScale);
    } else if (g.mode === "pan" && e.touches.length === 1) {
      e.preventDefault();
      const t = e.touches[0];
      setTx(g.startTx + (t.clientX - g.startX));
      setTy(g.startTy + (t.clientY - g.startY));
    }
  };
  const onTouchEnd = (e) => {
    if (e.touches.length === 0) {
      // If we snapped back to <=1, reset translate
      if (scale <= 1.05) { setScale(1); setTx(0); setTy(0); }
      gesture.current = null;
    }
  };

  const handleImgClick = (e) => {
    e.stopPropagation();
    const now = Date.now();
    if (now - lastTap.current < 300) {
      // double-tap toggles zoom
      if (scale > 1) { setScale(1); setTx(0); setTy(0); }
      else { setScale(2.5); }
      lastTap.current = 0;
    } else {
      lastTap.current = now;
    }
  };

  return h("div", {
    className: "fixed inset-0 z-[70] bg-black flex items-center justify-center overflow-hidden",
    onClick: onClose,
  },
    h("img", {
      src: image.src, alt: image.alt || "",
      className: "max-w-full max-h-full object-contain select-none",
      onClick: handleImgClick,
      onTouchStart, onTouchMove, onTouchEnd,
      draggable: false,
      style: {
        transform: `translate(${tx}px, ${ty}px) scale(${scale})`,
        transformOrigin: "center center",
        transition: gesture.current ? "none" : "transform 0.18s ease-out",
        touchAction: "none",
      }
    }),
    h("button", {
      onClick: (e) => { e.stopPropagation(); onClose(); },
      className: "absolute top-4 right-4 w-10 h-10 rounded-full bg-white/15 text-white flex items-center justify-center safe-top z-10",
      "aria-label": "Close"
    }, h("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none" },
      h("path", { d: "M6 6l12 12M18 6L6 18", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round" })
    )),
    scale > 1 && h("button", {
      onClick: (e) => { e.stopPropagation(); setScale(1); setTx(0); setTy(0); },
      className: "absolute top-4 left-4 h-10 px-3 rounded-full bg-white/15 text-white text-xs font-semibold safe-top z-10",
    }, "Reset zoom"),
    (image.caption || image.credit) && h("div", {
      className: "absolute bottom-0 inset-x-0 p-4 text-[12.5px] text-white/80 leading-snug safe-bottom",
      style: { background: "linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0))" },
      onClick: (e) => e.stopPropagation()
    },
      image.caption && h("div", { className: "text-white mb-0.5" }, image.caption),
      image.credit && h("div", null, image.credit),
      h("div", { className: "text-[11px] text-white/60 mt-1" }, "Pinch or double-tap to zoom · drag to pan · tap outside to close")
    )
  );
}

/* ============================================================
   Scroll progress hook (for section detail reading)
   ============================================================ */
function useScrollProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const docEl = document.documentElement;
      const max = docEl.scrollHeight - window.innerHeight;
      const y = window.scrollY || docEl.scrollTop;
      const p = max > 8 ? (y / max) * 100 : 100;
      setPct(Math.min(100, Math.max(0, p)));
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    onScroll();
    return () => { window.removeEventListener("scroll", onScroll); window.removeEventListener("resize", onScroll); };
  }, []);
  return pct;
}

/* ============================================================
   Tap-to-highlight sentences
   Approach: split each paragraph into sentences, render each as a
   non-selectable tap target. A single tap toggles the highlight
   for that sentence. Because there is no text selection, browser
   menus (copy / share / "search web for…") never appear.
   ============================================================ */
function splitIntoSentences(text) {
  // Return array of {start, end, text}. Sentence terminators are ., !, ?, …
  // followed by whitespace (or end of string). Simple regex — works well
  // for our clean narrative prose.
  const out = [];
  const re = /[^.!?…]+[.!?…]+["'”’)\]]?/g;
  let m;
  let last = 0;
  while ((m = re.exec(text)) !== null) {
    const start = m.index;
    const end = start + m[0].length;
    out.push({ start, end, text: text.slice(start, end) });
    last = end;
  }
  if (last < text.length) {
    const rest = text.slice(last);
    if (rest.trim()) out.push({ start: last, end: text.length, text: rest });
  }
  if (!out.length) out.push({ start: 0, end: text.length, text });
  return out;
}

function HighlightableText({ text, day, sectionId, highlights, onChangeHighlights }) {
  const paragraphs = text.split(/\n\n+/);
  const paraSentences = useMemo(() => paragraphs.map(splitIntoSentences), [text]);

  const isSentenceHighlighted = (para, s, e) => {
    const list = highlights || [];
    return list.some(h => h.p === para && h.s <= s && h.e >= e);
  };
  const toggleSentence = (para, s, e) => {
    if (isSentenceHighlighted(para, s, e)) {
      // Remove any highlight in this paragraph that covers this sentence
      const all = getHighlights();
      const key = `${day}-${sectionId}`;
      const list = all[key] || [];
      all[key] = list.filter(h => !(h.p === para && h.s <= s && h.e >= e));
      setHighlights(all);
      onChangeHighlights && onChangeHighlights(all);
    } else {
      const updated = addHighlight(day, sectionId, para, s, e);
      onChangeHighlights && onChangeHighlights(updated);
    }
  };

  return h("div", { className: "reading", style: { userSelect: "none", WebkitUserSelect: "none", WebkitTouchCallout: "none" } },
    paragraphs.map((p, i) => {
      const sentences = paraSentences[i];
      return h("p", { key: i, "data-para": i },
        // Render each sentence as a tap target, keeping surrounding whitespace
        (() => {
          const nodes = [];
          let cursor = 0;
          sentences.forEach((sen, sj) => {
            // Whitespace between last sentence and this one
            if (sen.start > cursor) nodes.push(p.slice(cursor, sen.start));
            const active = isSentenceHighlighted(i, sen.start, sen.end);
            nodes.push(h("span", {
              key: `s${sj}`,
              className: "dk-sentence",
              onClick: (e) => { e.stopPropagation(); toggleSentence(i, sen.start, sen.end); },
              style: {
                backgroundColor: active ? "#FDE68A" : "transparent",
                borderRadius: 3,
                padding: active ? "1px 2px" : "0",
                cursor: "pointer",
                transition: "background-color 0.15s ease",
              }
            }, sen.text));
            cursor = sen.end;
          });
          if (cursor < p.length) nodes.push(p.slice(cursor));
          return nodes;
        })()
      );
    })
  );
}

/* QUIZ */
function QuizView({ article, day, refreshTick }) {
  const quiz = article.quiz || [];
  const saved = LS.get(K.quiz(day), null);
  const [answers, setAnswers] = useState(saved ? saved.answers : Array(quiz.length).fill(null));
  const [submitted, setSubmitted] = useState(saved ? !!saved.submitted : false);
  const [score, setScore] = useState(saved ? saved.score : 0);

  const allAnswered = answers.every(a => a !== null);

  const submit = () => {
    const newScore = answers.reduce((s, a, i) => s + (a === quiz[i].correctIndex ? 1 : 0), 0);
    setScore(newScore);
    setSubmitted(true);
    LS.set(K.quiz(day), { answers, score: newScore, submitted: true });
    if (refreshTick) refreshTick();
  };
  const retake = () => {
    setAnswers(Array(quiz.length).fill(null));
    setSubmitted(false);
    setScore(0);
    LS.rm(K.quiz(day));
    if (refreshTick) refreshTick();
  };

  return h("div", null,
    h("div", { className: "text-xs uppercase tracking-widest text-stone-500 mb-1" }, "Quiz"),
    h("p", { className: "text-sm text-stone-500 mb-5" }, "Five questions. Test your understanding, not your memory."),

    h("div", { className: "space-y-5" },
      quiz.map((q, qi) =>
        h("div", { key: qi, className: "bg-white border border-stone-200 rounded-2xl p-4" },
          h("div", { className: "text-[11px] uppercase tracking-widest text-stone-400 mb-2 font-medium" }, `Question ${qi + 1}`),
          h("p", { className: "text-[16.5px] text-stone-900 mb-4 leading-snug", style: { fontWeight: 500 } }, q.question),
          h("div", { className: "space-y-2" },
            q.options.map((opt, oi) => {
              const selected = answers[qi] === oi;
              const correct = submitted && oi === q.correctIndex;
              const wrongChosen = submitted && selected && oi !== q.correctIndex;
              let cls = "border-stone-200 bg-white";
              if (selected && !submitted) cls = "border-stone-900 bg-stone-50";
              if (correct) cls = "border-emerald-500 bg-emerald-50";
              if (wrongChosen) cls = "border-rose-400 bg-rose-50";
              return h("button", {
                key: oi,
                onClick: () => !submitted && setAnswers(a => { const c = [...a]; c[qi] = oi; return c; }),
                disabled: submitted,
                className: `w-full text-left px-4 py-3 rounded-xl border-2 transition-colors flex items-start gap-3 ${cls}`,
                style: { minHeight: 48 }
              },
                h("span", { className: "text-sm font-semibold text-stone-500 mt-0.5" }, String.fromCharCode(65 + oi)),
                h("span", { className: "text-[15.5px] text-stone-800 leading-snug flex-1" }, opt),
                correct && h("span", { className: "text-emerald-600 text-xl leading-none" }, "✓"),
                wrongChosen && h("span", { className: "text-rose-500 text-xl leading-none" }, "✗"),
              );
            })
          ),
          submitted && h("div", { className: "mt-3 px-3 py-2 bg-stone-50 rounded-lg text-[13.5px] text-stone-700 leading-relaxed" },
            h("span", { className: "font-semibold text-stone-900" }, "Why: "), q.explanation
          )
        )
      )
    ),

    !submitted ? h("button", {
      onClick: submit,
      disabled: !allAnswered,
      className: "mt-6 w-full py-4 rounded-2xl text-white font-semibold text-base",
      style: { backgroundColor: allAnswered ? "#1B1B1B" : "#A8A29E", minHeight: 52 }
    }, "Submit answers")
      : h("div", { className: "mt-6 space-y-2.5" },
          h("div", { className: "bg-stone-900 text-white rounded-2xl p-5 text-center" },
            h("div", { className: "text-[11px] uppercase tracking-widest text-stone-400 mb-1" }, "Your score"),
            h("div", { className: "serif text-5xl", style: { fontWeight: 600 } }, score, h("span", { className: "text-2xl text-stone-400" }, ` / ${quiz.length}`))
          ),
          h("button", { onClick: retake, className: "w-full py-3 rounded-xl bg-stone-100 text-stone-700 text-sm font-medium", style: { minHeight: 44 } }, "Retake quiz")
        )
  );
}

/* ============================================================

   ============================================================ */
function ProgressScreen({ sectionsMap, maxDay, userName }) {
  const totalDone = totalCompletedDays(sectionsMap);
  const pct = Math.round(totalDone / TOTAL_DAYS * 100);
  // Average quiz score
  const allQuizzes = CURRICULUM.map(t => LS.get(K.quiz(t.day), null)).filter(q => q && q.submitted);
  const avgScore = allQuizzes.length ? (allQuizzes.reduce((s, q) => s + q.score, 0) / allQuizzes.length) : 0;
  // Streak: consecutive completed days ending at maxDay-1
  let streak = 0;
  for (let d = maxDay - 1; d >= 1 && isDayComplete(d, sectionsMap); d--) streak++;
  const weeks = Array.from({ length: 16 }, (_, w) => CURRICULUM.filter(t => t.week === w + 1));
  const allDone = totalDone === TOTAL_DAYS;

  return h("div", { className: "px-5 pt-6 pb-28 safe-top" },
    h("h1", { className: "serif text-3xl text-stone-900 mb-1", style: { fontWeight: 600 } }, "Progress"),
    h("p", { className: "text-sm text-stone-500 mb-6" }, "Ninety-one days. One mind, slowly filling up."),

    allDone && h(GraduationCard, { userName }),

    h("div", { className: "grid grid-cols-3 gap-2.5 mb-6" },
      h(StatCard, { label: "Done", value: `${pct}%`, sub: `${totalDone} / ${TOTAL_DAYS}` }),
      h(StatCard, { label: "Avg quiz", value: avgScore.toFixed(1), sub: "out of 5" }),
      h(StatCard, { label: "Streak", value: String(streak), sub: streak === 1 ? "day" : "days" }),
    ),
    h("div", { className: "mb-2" }, h(ProgressBar, { pct, color: "#1B1B1B", height: 6 })),
    h("div", { className: "text-[11px] text-stone-500 mt-1.5 mb-6 text-center" }, allDone ? "All ninety-one days complete." : `${TOTAL_DAYS - totalDone} days to go.`),

    h("div", { className: "space-y-3.5" },
      weeks.map((days, wi) =>
        h("div", { key: wi },
          h("div", { className: "flex items-center justify-between mb-1.5" },
            h("div", { className: "text-[11px] uppercase tracking-widest text-stone-500 font-semibold" }, "Week ", wi + 1),
            h("div", { className: "text-[11px] text-stone-400" }, days.filter(d => isDayComplete(d.day, sectionsMap)).length, " / ", days.length)
          ),
          h("div", { className: "flex gap-1.5" },
            days.map(d => {
              const done = isDayComplete(d.day, sectionsMap);
              const isCurrent = d.day === maxDay && !done;
              const locked = d.day > maxDay;
              let bg = "#E7E5E4", txt = "#A8A29E";
              if (done) { bg = "#10B981"; txt = "#fff"; }
              else if (isCurrent) { bg = "#1B1B1B"; txt = "#fff"; }
              return h("div", {
                key: d.day,
                title: `Day ${d.day}: ${d.title}`,
                className: "flex-1 aspect-square rounded-md flex items-center justify-center text-[11px] font-semibold",
                style: { backgroundColor: bg, color: txt, minHeight: 28, opacity: locked ? 0.55 : 1 }
              }, d.day)
            })
          )
        )
      )
    )
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [onboarded, setOnboarded] = useState(() => LS.get(K.onboarded, false));
  const [userName, setUserName] = useState(() => LS.get(K.name, ""));
  const [tab, setTab] = useState("today");
  const [sectionsMap, setSectionsMapState] = useState(() => getSections());
  const [activeDay, setActiveDay] = useState(() => {
    const saved = LS.get(K.activeDay, null);
    const mx = maxUnlockedDay(getSections());
    return saved && saved <= mx ? saved : mx;
  });
  const [activeSection, setActiveSection] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [lightboxImage, setLightboxImage] = useState(null);
  const [, forceTick] = useState(0);
  const refreshTick = useCallback(() => forceTick(t => t + 1), []);

  // Wire the lightbox opener so image components can call it
  useEffect(() => { _openLightbox = (img) => setLightboxImage(img); return () => { _openLightbox = null; }; }, []);

  // Persist activeDay
  useEffect(() => { LS.set(K.activeDay, activeDay); }, [activeDay]);

  const maxUnlocked = maxUnlockedDay(sectionsMap);

  const completeOnboarding = (name) => {
    LS.set(K.onboarded, true);
    LS.set(K.name, name || "");
    setUserName(name || "");
    setOnboarded(true);
    setActiveDay(1);
  };

  const markSection = useCallback((day, sectionId, value) => {
    setSectionsMapState(prev => {
      const next = { ...prev };
      const key = `${day}-${sectionId}`;
      if (value) next[key] = true;
      else delete next[key];
      setSections(next);
      return next;
    });
  }, []);

  const clearAll = () => {
    LS.rm(K.sections);
    CURRICULUM.forEach(t => { LS.rm(K.quiz(t.day)); LS.rm(K.reflection(t.day)); });
    setSectionsMapState({});
    setActiveDay(1);
    setActiveSection(null);
  };

  const saveName = (name) => {
    LS.set(K.name, name);
    setUserName(name);
  };

  if (!onboarded) return h(Onboarding, { onDone: completeOnboarding });

  if (!window.DAILY_ARTICLES) {
    return h("div", { className: "min-h-screen flex flex-col items-center justify-center px-8 text-center" },
      h("h2", { className: "serif text-2xl text-stone-900 mb-2" }, "Couldn't load articles"),
      h("p", { className: "text-stone-500 text-sm leading-relaxed" }, "data.js failed to load. If you're opening the file directly, make sure data.js is in the same folder as index.html.")
    );
  }

  const article = getArticle(activeDay);
  if (!article) {
    return h("div", { className: "min-h-screen flex flex-col items-center justify-center px-8 text-center" },
      h("h2", { className: "serif text-2xl text-stone-900 mb-2" }, "Article missing"),
      h("p", { className: "text-stone-500 text-sm" }, "Day ", activeDay, " is not available.")
    );
  }

  let body;
  if (tab === "today") {
    body = activeSection
      ? h(SectionDetail, {
          day: activeDay, article, sectionId: activeSection, sectionsMap,
          onBack: () => setActiveSection(null),
          onMarkSection: (id, v) => markSection(activeDay, id, v),
          refreshTick,
        })
      : h(DayOverview, {
          day: activeDay, article, sectionsMap, userName,
          onOpenSection: (id) => setActiveSection(id),
          onMarkSection: (id, v) => markSection(activeDay, id, v),
          onAdvance: (d) => { setActiveDay(d); setActiveSection(null); window.scrollTo(0, 0); },
        });
  } else if (tab === "archive") {
    body = h(ArchiveScreen, {
      sectionsMap, maxDay: maxUnlocked,
      onOpenDay: (d) => { setActiveDay(d); setActiveSection(null); setTab("today"); window.scrollTo(0, 0); }
    });
  } else if (tab === "progress") {
    body = h(ProgressScreen, { sectionsMap, maxDay: maxUnlocked, userName });
  }

  return h("div", { className: "relative" },
    body,
    /* Settings button — top right, hidden in section-detail to keep reading clean */
    !(tab === "today" && activeSection) && h("button", {
      onClick: () => setShowSettings(true),
      className: "fixed top-3 right-3 z-30 w-10 h-10 rounded-full bg-white/90 border border-stone-200 flex items-center justify-center text-stone-500",
      style: { marginTop: "env(safe-area-inset-top, 0)" },
      "aria-label": "Settings"
    }, h("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none" },
      h("circle", { cx: 12, cy: 12, r: 3, stroke: "currentColor", strokeWidth: 1.7 }),
      h("path", { d: "M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06A2 2 0 113.4 16.96l.06-.06A1.65 1.65 0 003.79 15a1.65 1.65 0 00-1.51-1H2a2 2 0 010-4h.09A1.65 1.65 0 003.79 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 008.11 4.79 1.65 1.65 0 009 3.28V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.21 9a1.65 1.65 0 001.51 1H22a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z", stroke: "currentColor", strokeWidth: 1.4, strokeLinejoin: "round" }),
    )),
    showSettings && h(SettingsModal, {
      userName,
      onSaveName: (n) => { saveName(n); setShowSettings(false); },
      onClose: () => setShowSettings(false),
      onClearProgress: clearAll
    }),
    h(BottomNav, { tab, setTab: (t) => { setActiveSection(null); setTab(t); } }),
    h(Lightbox, { image: lightboxImage, onClose: () => setLightboxImage(null) })
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
